<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- 3/4 top-down clearing room; aligns to the 16x9 grid of 120px collision
       tiles in w1/w2/w3a/w3b (hedge border, treehouse trunk at cols 7-8
       rows 1-2, boulders at (3,5) and (11,5), east path gap at col 15 row 4). -->
  <defs>
    <pattern id="grassC" width="240" height="240" patternUnits="userSpaceOnUse">
      <rect width="240" height="240" fill="#84c46c"/>
      <rect width="120" height="120" fill="#7cbc64"/>
      <rect x="120" y="120" width="120" height="120" fill="#7cbc64"/>
      <path d="M 60 180 q 6 -18 12 0 M 190 60 q 6 -18 12 0" stroke="#66a651" stroke-width="5" fill="none" stroke-linecap="round"/>
    </pattern>
    <linearGradient id="hedgeC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f9a54"/><stop offset="1" stop-color="#42873f"/>
    </linearGradient>
  </defs>

  <!-- floor -->
  <rect width="1920" height="1080" fill="url(#grassC)"/>

  <!-- east path exiting through the gap at col 15, row 4 -->
  <path d="M 1500 492 L 1920 492 L 1920 588 L 1500 588 Q 1440 540 1500 492 Z" fill="#d9b98a"/>
  <line x1="1500" y1="496" x2="1920" y2="496" stroke="#c6a271" stroke-width="6"/>
  <line x1="1500" y1="584" x2="1920" y2="584" stroke="#c6a271" stroke-width="6"/>

  <!-- hedge walls with darker front faces (3/4 view), gap on the east at row 4 -->
  <g>
    <rect x="0" y="0" width="1920" height="96" fill="url(#hedgeC)"/>
    <rect x="0" y="96" width="1920" height="24" fill="#356b30"/>
    <rect x="0" y="960" width="1920" height="96" fill="url(#hedgeC)"/>
    <rect x="0" y="1056" width="1920" height="24" fill="#356b30"/>
    <rect x="0" y="0" width="120" height="1080" fill="url(#hedgeC)"/>
    <rect x="96" y="0" width="24" height="1080" fill="#356b30"/>
    <rect x="1800" y="0" width="120" height="480" fill="url(#hedgeC)"/>
    <rect x="1776" y="0" width="24" height="480" fill="#356b30"/>
    <rect x="1800" y="600" width="120" height="480" fill="url(#hedgeC)"/>
    <rect x="1776" y="600" width="24" height="480" fill="#356b30"/>
    <g fill="#5cab5b">
      <circle cx="300" cy="48" r="38"/><circle cx="640" cy="52" r="32"/><circle cx="1320" cy="46" r="38"/><circle cx="1660" cy="52" r="32"/>
      <circle cx="480" cy="1008" r="38"/><circle cx="1080" cy="1012" r="32"/><circle cx="1500" cy="1008" r="38"/>
      <circle cx="58" cy="380" r="34"/><circle cx="58" cy="760" r="34"/><circle cx="1862" cy="300" r="34"/><circle cx="1862" cy="860" r="34"/>
    </g>
  </g>

  <!-- treehouse: trunk fills tiles (7-8, 1-2); house sits above on the north wall -->
  <g>
    <rect x="810" y="0" width="300" height="150" rx="18" fill="#b5804e"/>
    <rect x="795" y="128" width="330" height="26" rx="10" fill="#8a6a4a"/>
    <rect x="900" y="34" width="120" height="94" rx="10" fill="#6e563c"/>
    <ellipse cx="960" cy="352" rx="150" ry="26" fill="#000" opacity="0.10"/>
    <rect x="852" y="132" width="216" height="228" rx="26" fill="#7a5230"/>
    <rect x="852" y="322" width="216" height="38" rx="14" fill="#64411f"/>
    <!-- ladder on the trunk's south face, down to Robin's spot -->
    <line x1="930" y1="150" x2="930" y2="356" stroke="#e8cf9a" stroke-width="12" stroke-linecap="round"/>
    <line x1="990" y1="150" x2="990" y2="356" stroke="#e8cf9a" stroke-width="12" stroke-linecap="round"/>
    <g stroke="#d9b978" stroke-width="10" stroke-linecap="round">
      <line x1="930" y1="188" x2="990" y2="188"/>
      <line x1="930" y1="236" x2="990" y2="236"/>
      <line x1="930" y1="284" x2="990" y2="284"/>
      <line x1="930" y1="332" x2="990" y2="332"/>
    </g>
  </g>

  <!-- boulders on tiles (3,5) and (11,5), front faces shaded -->
  <g>
    <ellipse cx="420" cy="708" rx="56" ry="16" fill="#000" opacity="0.10"/>
    <path d="M 372 700 Q 372 636 420 630 Q 468 636 468 700 Z" fill="#9aa3ab"/>
    <rect x="372" y="686" width="96" height="16" rx="8" fill="#7f8890"/>
    <ellipse cx="1380" cy="708" rx="56" ry="16" fill="#000" opacity="0.10"/>
    <path d="M 1332 700 Q 1332 636 1380 630 Q 1428 636 1428 700 Z" fill="#9aa3ab"/>
    <rect x="1332" y="686" width="96" height="16" rx="8" fill="#7f8890"/>
  </g>

  <!-- flowers on walkable grass -->
  <g>
    <circle cx="300" cy="330" r="10" fill="#ffd66b"/><circle cx="300" cy="330" r="4" fill="#ff9d5c"/>
    <circle cx="1560" cy="760" r="10" fill="#ff9db8"/><circle cx="1560" cy="760" r="4" fill="#fff"/>
    <circle cx="720" cy="880" r="10" fill="#b7a7ff"/><circle cx="720" cy="880" r="4" fill="#fff"/>
    <circle cx="1200" cy="900" r="10" fill="#ffd66b"/><circle cx="1200" cy="900" r="4" fill="#ff9d5c"/>
  </g>
</svg>
